version: '3.8'

services:
  cloud-nav:
    build: .
    container_name: cloud-nav
    restart: unless-stopped
    ports:
      - '8821:8000'
    environment:
      - APP_NAME=Cloud Server
      - APP_VERSION=2.0.0
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root123456
      - MYSQL_DATABASE=cloud
      - MYSQL_POOL_SIZE=10
      - MYSQL_MAX_OVERFLOW=20
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=114514
      - REDIS_DB=0
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE=10485760
      - LOG_LEVEL=INFO
      - LOG_DIR=logs
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - QWEATHER_HOST=${QWEATHER_HOST:-}
      - QWEATHER_KEY=${QWEATHER_KEY:-}
      - HOLIDAY_API_BASE=http://timor.tech/api/holiday/year
    volumes:
      - ./prod/uploads:/app/uploads
      - ./prod/logs:/app/logs
      - D:/test:/app/output
    networks:
      - mysql-network
      - redis-network

networks:
  mysql-network:
    name: mysql_mysql-network
    external: true
  redis-network:
    name: redis_redis-network
    external: true
